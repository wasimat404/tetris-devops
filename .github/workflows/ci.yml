name: CI

# Triggers — when does this workflow run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  hello:
    name: Hello world
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repo structure
        run: |
          echo "Repo contents:"
          ls -la
          echo "---"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.event_name }}"
