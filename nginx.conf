server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Security headers ----
    # These cost nothing and shut down whole categories of attacks.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Health endpoint ----
    # K8s liveness/readiness probes will hit this. Cheap and reliable.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- nginx stub_status for Prometheus exporter (Stage 6) ----
    # Locked to localhost so only an in-pod sidecar exporter can read it.
    location = /stub_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # ---- App routing ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Cache static assets ----
    # 1 hour is conservative; tune later. Mark immutable so browsers don't revalidate.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}

