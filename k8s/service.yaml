apiVersion: v1
kind: Service
metadata:
  name: tetris
  namespace: tetris
  labels:
    app.kubernetes.io/name: tetris-devops
  annotations:
    # Use a Network Load Balancer (modern, cheaper than the legacy Classic LB)
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    # Make the LB internet-facing (the default; being explicit)
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: tetris
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
